version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/civic_issue_portal
      - SESSION_SECRET=development_secret_key_change_me_in_production
      - REPL_ID=local_dev_repl_id
      # - ISSUER_URL=https://replit.com/oidc # Can be overriden based on your Auth provider
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=civic_issue_portal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d civic_issue_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
